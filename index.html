<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urna de Opinião</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(to right, #4facfe, #00f2fe);
    color: white;
}

h1 {
    margin-top: 20px;
}

.container {
    margin-top: 30px;
}

button {
    font-size: 40px;
    margin: 10px;
    padding: 20px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    transition: 0.2s;
    background: white;
}

button:hover {
    transform: scale(1.2);
}

.resultado {
    margin-top: 30px;
    font-size: 18px;
    background: white;
    color: black;
    padding: 20px;
    border-radius: 15px;
    display: inline-block;
}

.toggle-btn {
    margin-top: 15px;
    font-size: 18px;
    padding: 10px 20px;
}
</style>
</head>

<body>

<h1>O que voce achou do lanche?</h1>

<div class="container">

    <div>
        <button onclick="votar(0)">😡</button><br>
        <small>Detestei</small>
    </div>

    <div>
        <button onclick="votar(1)">🙁</button><br>
        <small>Não gostei</small>
    </div>

    <div>
        <button onclick="votar(2)">😐</button><br>
        <small>Indiferente</small>
    </div>

    <div>
        <button onclick="votar(3)">🙂</button><br>
        <small>Gostei</small>
    </div>

    <div>
        <button onclick="votar(4)">😃</button><br>
        <small>Adorei</small>
    </div>

</div>

<div class="resultado" id="resultado">
    Resultado oculto 🔒
</div>

<br>

<button class="toggle-btn" onclick="toggleResultado()" id="btnToggle">
    👁️ Mostrar resultado
</button>

<br>

<button class="toggle-btn" onclick="resetarVotos()">
    🗑️ Resetar votos
</button>

<script>
let votos = JSON.parse(localStorage.getItem("votos")) || [0,0,0,0,0];
let visivel = false;

function votar(opcao) {
    votos[opcao]++;
    localStorage.setItem("votos", JSON.stringify(votos));
    atualizarResultado();
}

function atualizarResultado() {
    if (!visivel) {
        document.getElementById("resultado").innerHTML = "Resultado oculto 🔒";
        return;
    }

    let total = votos.reduce((a, b) => a + b, 0);

    if (total === 0) {
        document.getElementById("resultado").innerHTML = "Nenhum voto ainda.";
        return;
    }

    let porcentagens = votos.map(v => ((v / total) * 100).toFixed(1));

    document.getElementById("resultado").innerHTML = `
        😡 ${porcentagens[0]}% (${votos[0]})<br>
        🙁 ${porcentagens[1]}% (${votos[1]})<br>
        😐 ${porcentagens[2]}% (${votos[2]})<br>
        🙂 ${porcentagens[3]}% (${votos[3]})<br>
        😃 ${porcentagens[4]}% (${votos[4]})<br>
        <hr>
        Total: ${total}
    `;
}

function toggleResultado() {
    visivel = !visivel;

    let botao = document.getElementById("btnToggle");

    if (visivel) {
        botao.innerHTML = "🙈 Esconder resultado";
    } else {
        botao.innerHTML = "👁️ Mostrar resultado";
    }

    atualizarResultado();
}

function resetarVotos() {
    let confirmar = confirm("Tem certeza que deseja apagar todos os votos?");

    if (!confirmar) return;

    votos = [0,0,0,0,0];
    localStorage.removeItem("votos");

    atualizarResultado();
}

atualizarResultado();
</script>

</body>
</html>
